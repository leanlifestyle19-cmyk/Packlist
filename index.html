<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" id="themeColorMeta" content="#1665C0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PackList">
<meta name="description" content="Smart packing lists for every trip">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>PackList</title>
<style>
/* ── RESET ───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{height:100%;font-family:'Inter',sans-serif;font-size:15px;line-height:1.5;
  background:var(--bg);color:var(--text);transition:background .25s,color .25s;
  overscroll-behavior:none;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font:inherit;color:inherit;border:none;background:none;outline:none}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
ul,ol{list-style:none}

/* ── TOKENS ──────────────────────────────────────────── */
:root{
  --bg:#F0F9FF;--bg-card:#FFFFFF;--bg-subtle:#EBF5FF;
  --text:#061826;--text-2:#2D5F7C;--text-3:#5B8FA8;--text-muted:#8BAEC0;
  --border:rgba(22,101,192,0.12);--accent:#1665C0;--teal:#0698A0;
  --green:#2E7D32;--red:#C62828;--amber:#E65100;
  --radius:14px;--radius-sm:8px;--radius-lg:20px;
  --shadow:0 2px 12px rgba(6,24,38,0.08);
  --shadow-lg:0 8px 32px rgba(6,24,38,0.14);
  --nav-h:64px;--header-h:56px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-theme="dark"]{
  --bg:#061826;--bg-card:#0D2340;--bg-subtle:#0D2E4E;
  --text:#E1F5FE;--text-2:#90CAE0;--text-3:#5B8FA8;--text-muted:#3D6E8A;
  --border:rgba(77,184,200,0.12);--accent:#4DB8C8;--teal:#4DB8C8;
  --shadow:0 2px 12px rgba(0,0,0,0.3);--shadow-lg:0 8px 32px rgba(0,0,0,0.5);
}

/* ── GRADIENTS ───────────────────────────────────────── */
.grad-ocean {background:linear-gradient(135deg,#1665C0,#0698A0)}
.grad-sunset{background:linear-gradient(135deg,#E65100,#F57F17)}
.grad-forest{background:linear-gradient(135deg,#1B5E20,#00695C)}
.grad-rose  {background:linear-gradient(135deg,#AD1457,#C2185B)}
.grad-gold  {background:linear-gradient(135deg,#F57F17,#FFB300)}
.grad-slate {background:linear-gradient(135deg,#263238,#546E7A)}
.grad-purple{background:linear-gradient(135deg,#4527A0,#7B1FA2)}
.grad-sky   {background:linear-gradient(135deg,#0277BD,#00838F)}

/* ── LAYOUT ──────────────────────────────────────────── */
#app{display:flex;flex-direction:column;min-height:100%;position:relative}
.screen{display:none;flex-direction:column;flex:1;
  padding-bottom:calc(var(--nav-h) + var(--safe-bottom));
  min-height:100dvh}
.screen.active{display:flex}
.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── HEADER ──────────────────────────────────────────── */
.app-header{
  position:sticky;top:0;z-index:100;height:var(--header-h);
  display:flex;align-items:center;gap:12px;padding:0 16px;
  background:var(--bg);border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.header-back{width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-subtle);color:var(--text-2);flex-shrink:0}
.header-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;
  font-weight:700;color:var(--text);flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-actions{display:flex;gap:8px;flex-shrink:0}
.header-icon-btn{width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-subtle);color:var(--text-2)}

/* ── BOTTOM NAV ──────────────────────────────────────── */
#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  height:calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:var(--bg-card);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  box-shadow:0 -4px 20px rgba(6,24,38,0.06);
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:8px 0;color:var(--text-muted);transition:color .2s;
  font-size:11px;font-weight:500}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px}
.nav-fab{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--teal));
  color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(22,101,192,0.35);
  flex-shrink:0;margin-top:-16px;transition:transform .2s;
}
.nav-fab:active{transform:scale(0.94)}

/* ── BUTTONS ─────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;
  gap:7px;border-radius:var(--radius-sm);padding:12px 20px;
  font-size:15px;font-weight:600;cursor:pointer;transition:all .18s;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{filter:brightness(0.9)}
.btn-ghost{background:var(--bg-subtle);color:var(--text-2);
  border:1.5px solid var(--border)}
.btn-danger{background:#FFEBEE;color:#C62828}
[data-theme="dark"] .btn-danger{background:#2D0A0A;color:#EF9A9A}
.btn-full{width:100%;display:flex}
.btn-sm{padding:8px 14px;font-size:13px}

/* ── FAB FLOAT ───────────────────────────────────────── */
.fab-float{
  position:fixed;right:20px;z-index:150;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--teal));
  color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(22,101,192,0.4);transition:transform .2s;
}
.fab-float:active{transform:scale(0.93)}

/* ── HOME HERO ───────────────────────────────────────── */
.home-hero{min-height:190px;color:#fff;display:flex;
  flex-direction:column;justify-content:flex-end;overflow:hidden;position:relative}
.home-hero-content{padding:20px;position:relative;z-index:1}
.home-greeting{font-size:12px;opacity:0.8;margin-bottom:2px}
.home-title{font-family:'Plus Jakarta Sans',sans-serif;
  font-size:24px;font-weight:700;line-height:1.2}
.home-sub{font-size:13px;opacity:0.8;margin-top:4px}
.wave-divider{display:block;width:100%;margin-bottom:-2px;position:relative;z-index:1}

/* ── LIST CARD ───────────────────────────────────────── */
.list-card{
  position:relative;border-radius:var(--radius-lg);overflow:hidden;
  min-height:140px;cursor:pointer;color:#fff;box-shadow:var(--shadow-lg);
}
.list-card-inner{
  padding:18px 20px;display:flex;flex-direction:column;
  justify-content:space-between;min-height:140px;
  background:linear-gradient(180deg,rgba(0,0,0,0) 20%,rgba(0,0,0,0.4) 100%);
}
.list-card-top{display:flex;justify-content:space-between;align-items:flex-start}
.list-card-template{font-size:28px}
.list-card-badge{background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);
  border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.05em}
.list-card-name{font-family:'Plus Jakarta Sans',sans-serif;
  font-size:18px;font-weight:700;margin-bottom:8px;line-height:1.2}
.list-card-progress-wrap{height:5px;background:rgba(255,255,255,0.25);
  border-radius:3px;overflow:hidden;margin-bottom:5px}
.list-card-progress-fill{height:100%;background:#fff;border-radius:3px;
  transition:width .4s ease}
.list-card-stats{font-size:12px;opacity:0.85}

/* ── PROGRESS BAR ────────────────────────────────────── */
.progress-wrap{background:var(--bg-subtle);border-radius:20px;
  height:10px;overflow:hidden}
.progress-fill{height:100%;
  background:linear-gradient(90deg,var(--accent),var(--teal));
  border-radius:20px;transition:width .4s ease}

/* ── CATEGORY SECTION ────────────────────────────────── */
.category-section{margin-bottom:4px}
.category-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;cursor:pointer;
  background:var(--bg);position:sticky;
  top:calc(var(--header-h));z-index:80;
  border-bottom:1px solid var(--border);
}
.category-icon{font-size:18px;width:28px;text-align:center}
.category-name{font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;font-weight:700;color:var(--text-2);flex:1}
.category-count{font-size:12px;color:var(--text-muted);font-weight:500;
  font-family:'DM Mono',monospace}
.category-chevron{color:var(--text-muted);font-size:14px;
  transition:transform .2s;flex-shrink:0}
.category-chevron.open{transform:rotate(180deg)}
.category-items{display:flex;flex-direction:column}

/* ── PACK ITEM ───────────────────────────────────────── */
.pack-item{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px 13px 20px;
  border-bottom:1px solid var(--border);
  background:var(--bg-card);
  transition:background .15s;
}
.pack-item:last-child{border-bottom:none}
.pack-item.packed{background:var(--bg-subtle)}
.pack-checkbox{
  width:24px;height:24px;border-radius:50%;
  border:2px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
.pack-checkbox.checked{
  background:var(--green);border-color:var(--green);color:#fff;
}
.pack-label{flex:1;font-size:15px;color:var(--text);
  transition:color .2s;line-height:1.4;cursor:text;}
.pack-label:active{color:var(--accent)}
.pack-label.packed{text-decoration:line-through;color:var(--text-muted)}
.pack-delete{color:var(--text-muted);padding:4px 6px;
  font-size:16px;flex-shrink:0;opacity:0;transition:opacity .2s}
.pack-item:hover .pack-delete{opacity:1}
.pack-item:active .pack-delete{opacity:1}

/* ── ADD ITEM INLINE ─────────────────────────────────── */
.add-item-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px 10px 20px;
  border-bottom:1px solid var(--border);
  background:var(--bg-card);
}
.add-item-input{flex:1;font-size:14px;color:var(--text);
  padding:6px 0;}
.add-item-input::placeholder{color:var(--text-muted)}
.add-item-btn{width:28px;height:28px;border-radius:50%;
  background:var(--accent);color:#fff;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px}

/* ── ADD CATEGORY ROW ────────────────────────────────── */
.add-category-row{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;background:var(--bg-subtle);
  border:1.5px dashed var(--border);border-radius:var(--radius-sm);
  margin:8px 16px;cursor:pointer;color:var(--text-3);
  font-size:14px;font-weight:500;transition:all .2s;
}
.add-category-row:hover{border-color:var(--accent);color:var(--accent)}

/* ── FILTER BAR ──────────────────────────────────────── */
.filter-bar{display:flex;gap:6px;padding:10px 16px;
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;
  border-bottom:1px solid var(--border);background:var(--bg-card)}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:13px;
  font-weight:600;border:1.5px solid var(--border);
  background:var(--bg-subtle);color:var(--text-3);
  cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── TEMPLATE GRID ───────────────────────────────────── */
.template-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;
  padding:0 16px}
.template-card{
  border-radius:var(--radius);overflow:hidden;cursor:pointer;
  min-height:90px;display:flex;flex-direction:column;
  justify-content:flex-end;padding:14px;color:#fff;
  box-shadow:var(--shadow);transition:transform .2s;
  border:3px solid transparent;
}
.template-card:active{transform:scale(0.97)}
.template-card.selected{border-color:#fff;
  box-shadow:0 0 0 3px var(--accent)}
.template-icon{font-size:28px;margin-bottom:6px}
.template-name{font-family:'Plus Jakarta Sans',sans-serif;
  font-size:13px;font-weight:700;line-height:1.2}

/* ── FORMS ───────────────────────────────────────────── */
.form-section{padding:20px 16px;display:flex;flex-direction:column;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:13px;font-weight:600;color:var(--text-2);
  text-transform:uppercase;letter-spacing:0.05em}
.form-input{background:var(--bg-subtle);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;font-size:15px;
  color:var(--text);width:100%;transition:border-color .2s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text-muted)}

/* ── COLOR PICKER ────────────────────────────────────── */
.color-picker{display:flex;gap:10px;flex-wrap:wrap}
.color-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;
  transition:transform .2s,box-shadow .2s;border:3px solid transparent}
.color-swatch.selected{transform:scale(1.15);
  box-shadow:0 0 0 3px var(--bg),0 0 0 5px var(--accent)}

/* ── SECTION HEADER ──────────────────────────────────── */
.section-header{font-size:11px;font-weight:700;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.07em;padding:16px 16px 8px;
  display:flex;align-items:center;justify-content:space-between}

/* ── EMPTY STATE ─────────────────────────────────────── */
.empty-state{display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 24px;gap:16px;flex:1;text-align:center}
.empty-icon{font-size:52px;opacity:0.4}
.empty-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;
  font-weight:700;color:var(--text-2)}
.empty-sub{font-size:14px;color:var(--text-3);max-width:240px}

/* ── MODAL ───────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;z-index:500;
  background:rgba(6,24,38,0.6);backdrop-filter:blur(4px);
  display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-card);
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  width:100%;max-width:560px;
  padding:20px 20px calc(20px + var(--safe-bottom));
  box-shadow:var(--shadow-lg);max-height:85dvh;overflow-y:auto}
.modal-handle{width:36px;height:4px;border-radius:2px;
  background:var(--border);margin:0 auto 16px}
.modal-title{font-family:'Plus Jakarta Sans',sans-serif;
  font-size:18px;font-weight:700;margin-bottom:16px}

/* ── TOAST ───────────────────────────────────────────── */
#toast-container{position:fixed;
  bottom:calc(var(--nav-h) + var(--safe-bottom) + 12px);
  left:50%;transform:translateX(-50%);z-index:999;
  display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{background:var(--text);color:var(--bg);border-radius:var(--radius-sm);
  padding:10px 18px;font-size:14px;font-weight:500;
  box-shadow:var(--shadow-lg);opacity:0;transform:translateY(8px);
  pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap}
.toast.show{opacity:1;transform:translateY(0)}

/* ── SETTINGS ────────────────────────────────────────── */
.settings-group{padding:0 16px 8px}
.settings-label{font-size:11px;font-weight:700;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.07em;padding:16px 0 6px}
.settings-row{display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-row-left{display:flex;flex-direction:column;gap:2px}
.settings-row-title{font-size:15px;font-weight:500;color:var(--text)}
.settings-row-sub{font-size:13px;color:var(--text-3)}
.toggle{width:48px;height:28px;border-radius:14px;
  background:var(--border);position:relative;cursor:pointer;
  transition:background .25s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;
  width:22px;height:22px;border-radius:50%;background:#fff;
  transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
.toggle.on::after{transform:translateX(20px)}

/* ── LIST HERO ───────────────────────────────────────── */
.list-hero{position:relative;color:#fff;overflow:hidden;
  min-height:160px;display:flex;flex-direction:column;justify-content:flex-end}
.list-hero-content{padding:20px;position:relative;z-index:1}
.list-hero-name{font-family:'Plus Jakarta Sans',sans-serif;
  font-size:24px;font-weight:700;margin-bottom:10px}
.list-hero-progress-wrap{height:6px;background:rgba(255,255,255,0.25);
  border-radius:3px;overflow:hidden;margin-bottom:5px}
.list-hero-progress-fill{height:100%;background:#fff;border-radius:3px;
  transition:width .4s ease}
.list-hero-stats{font-size:13px;opacity:0.88}

/* ── SHARE TEXT ──────────────────────────────────────── */
.share-pre{background:var(--bg-subtle);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px;font-size:12px;
  font-family:'DM Mono',monospace;white-space:pre-wrap;word-break:break-all;
  max-height:200px;overflow-y:auto;color:var(--text-2);margin:12px 0}

/* ── CATEGORY INPUT MODAL ────────────────────────────── */
#cat-modal-input{background:var(--bg-subtle);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;font-size:16px;
  color:var(--text);width:100%;margin-bottom:16px;transition:border-color .2s}
#cat-modal-input:focus{border-color:var(--accent)}

/* ── RESPONSIVE ──────────────────────────────────────── */
@media(min-width:600px){
  .screen{max-width:560px;margin:0 auto}
  #bottom-nav{justify-content:center;gap:0}
  #bottom-nav .nav-item{max-width:120px}
  .fab-float{right:calc(50% - 280px + 20px)}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="scroll-body" id="home-scroll"></div>
  </div>

  <!-- LISTS -->
  <div id="screen-lists" class="screen">
    <div class="app-header">
      <span class="header-title">All Lists</span>
    </div>
    <div class="scroll-body" id="lists-scroll"></div>
  </div>

  <!-- LIST DETAIL -->
  <div id="screen-list" class="screen">
    <div id="list-detail-root" style="display:flex;flex-direction:column;flex:1;min-height:0"></div>
  </div>

  <!-- NEW LIST -->
  <div id="screen-new-list" class="screen">
    <div class="app-header">
      <button class="header-back" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <span class="header-title" id="new-list-header">New List</span>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" id="save-list-btn">Create</button>
      </div>
    </div>
    <div class="scroll-body" id="new-list-form"></div>
  </div>

  <!-- SETTINGS -->
  <div id="screen-settings" class="screen">
    <div class="app-header">
      <span class="header-title">Settings</span>
    </div>
    <div class="scroll-body" id="settings-root"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav id="bottom-nav">
    <button class="nav-item active" data-nav="home" onclick="navigate('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      <span>Home</span>
    </button>
    <button class="nav-item" data-nav="lists" onclick="navigate('lists')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>Lists</span>
    </button>
    <button class="nav-fab" onclick="navigate('new-list',{editListId:null})">

   DATABASE
══════════════════════════════════════════════════════ */
const DB_NAME = 'packlist';
const DB_VER  = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('lists')) {
        d.createObjectStore('lists', { keyPath: 'id' });
      }
      if (!d.objectStoreNames.contains('items')) {
        const is = d.createObjectStore('items', { keyPath: 'id' });
        is.createIndex('listId', 'listId');
      }
      if (!d.objectStoreNames.contains('settings')) {
        d.createObjectStore('settings', { keyPath: 'key' });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = e => reject(e.target.error);
  });
}

function dbOp(store, mode, fn) {
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(store, mode);
    const s   = tx.objectStore(store);
    const req = fn(s);
    if (req) {
      req.onsuccess = e => resolve(e.target.result);
      req.onerror   = e => reject(e.target.error);
    } else {
      tx.oncomplete = () => resolve();
      tx.onerror    = e => reject(e.target.error);
    }
  });
}

const Lists = {
  getAll: ()    => dbOp('lists','readonly', s => s.getAll()),
  get:    id    => dbOp('lists','readonly', s => s.get(id)),
  put:    list  => dbOp('lists','readwrite',s => s.put(list)),
  delete: id    => dbOp('lists','readwrite',s => s.delete(id)),
};

const Items = {
  getAll:  ()    => dbOp('items','readonly', s => s.getAll()),
  get:     id    => dbOp('items','readonly', s => s.get(id)),
  put:     item  => dbOp('items','readwrite',s => s.put(item)),
  delete:  id    => dbOp('items','readwrite',s => s.delete(id)),
  forList: lid   => new Promise((resolve, reject) => {
    const tx  = db.transaction('items','readonly');
    const idx = tx.objectStore('items').index('listId');
    const req = idx.getAll(lid);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  }),
};

const Settings = {

function showToast(msg, dur = 2600) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className   = 'toast';
  t.textContent = msg;
  c.appendChild(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, dur);
}

function applyTheme(dark) {

  document.getElementById('themeColorMeta').setAttribute('content', dark ? '#061826' : '#1665C0');
  state.darkMode = dark;
}

  const rec  = await Settings.get('darkMode').catch(() => null);
  const dark = rec ? rec.value : window.matchMedia('(prefers-color-scheme:dark)').matches;
  applyTheme(dark);
}

}

══════════════════════════════════════════════════════ */
function navigate(screen, params = {}, addHistory = true) {
  if (addHistory && state.screen !== screen) {
    state.history.push({ screen: state.screen, ...stateSnap() });
  }
  state.screen = screen;
  Object.assign(state, params);

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + screen);
  if (el) {
    el.classList.add('active');
    el.querySelector('.scroll-body')?.scrollTo(0,0);
  }
  document.querySelectorAll('[data-nav]').forEach(b =>
    b.classList.toggle('active', b.dataset.nav === screen)
  );

  const renders = {
    home:       renderHome,
    lists:      renderLists,
    list:       renderList,
    'new-list': renderNewList,
    settings:   renderSettings,
  };
  (renders[screen] || (() => {}))();
}

function stateSnap() {
  return { listId: state.listId, editListId: state.editListId, filter: state.filter };
}

function goBack() {
  if (!state.history.length) { navigate('home',{},false); return; }
  const prev = state.history.pop();
  navigate(prev.screen, prev, false);
}

      <path d="M0,32 C240,56 480,8 720,32 C960,56 1200,8 1440,32 L1440,56 L0,56 Z" fill="rgba(255,255,255,0.13)"/>
      <path d="M0,44 C360,20 720,56 1080,32 C1260,20 1380,40 1440,44 L1440,56 L0,56 Z" fill="rgba(255,255,255,0.09)"/>
    </svg>
  </div>`;

  if (lists.length === 0) {
    html += `<div class="empty-state">
      <div class="empty-icon">🎒</div>
      <div class="empty-title">No lists yet</div>
      <div class="empty-sub">Tap + to create your first packing list from a template</div>

    </div>`;
  } else {
    // Sort: active (least packed) first
    const sorted = lists.map(l => {
      const its   = allItems.filter(i => i.listId === l.id);
      const packed = its.filter(i => i.packed).length;
      const pct   = its.length ? Math.round((packed / its.length) * 100) : 0;
      return { ...l, _total: its.length, _packed: packed, _pct: pct };
    }).sort((a,b) => a._pct - b._pct);

    html += `<div class="section-header">Your Lists</div>
    <div style="padding:0 16px;display:flex;flex-direction:column;gap:10px">`;
    sorted.forEach(l => { html += listCardHTML(l, l._packed, l._total, l._pct); });
    html += `</div>`;

    // Overall stats
    const totalItems  = allItems.length;
    const totalPacked = allItems.filter(i => i.packed).length;
    if (totalItems > 0) {
      const pct = Math.round((totalPacked/totalItems)*100);
      html += `<div style="margin:16px 16px 8px;background:var(--bg-card);
        border-radius:var(--radius);border:1px solid var(--border);padding:16px">

          <div class="progress-fill" style="width:${pct}%"></div>

        <div style="font-size:12px;color:var(--text-muted);margin-top:6px">${totalPacked} of ${totalItems} items packed across all lists</div>
      </div>`;
    }

  html += toolkitBannerHTML('packlist');

}

async function renderLists() {
  const root     = document.getElementById('lists-scroll');

  const allItems = await Items.getAll();

  if (lists.length === 0) {
    root.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title">No lists yet</div>
      <div class="empty-sub">Tap + to create your first packing list</div>
    </div>`;
    return;
  }

  const sorted = lists.sort((a,b) => b.createdAt.localeCompare(a.createdAt));
  let html = `<div style="padding:8px 16px 16px;display:flex;flex-direction:column;gap:10px">`;
  sorted.forEach(l => {
    const its    = allItems.filter(i => i.listId === l.id);
    const packed = its.filter(i => i.packed).length;
    const pct    = its.length ? Math.round((packed/its.length)*100) : 0;
    html += listCardHTML(l, packed, its.length, pct);
  });
  html += `</div>`;
  root.innerHTML = html;
}

function listCardHTML(list, packed, total, pct) {
  const tpl  = TEMPLATES[list.template] || TEMPLATES.blank;
  const grad = list.color || tpl.color || 'grad-ocean';
  const bg   = gradBg(grad);
  const statusLabel = pct === 100 ? 'All packed ✓' : `${pct}%`;

  return `<div class="list-card" style="background:${bg}"
    onclick="navigate('list',{listId:'${list.id}',filter:'all'})">
    <div class="list-card-inner">
      <div class="list-card-top">
        <span class="list-card-template">${tpl.icon || '🎒'}</span>
        <span class="list-card-badge">${statusLabel}</span>
      </div>
      <div>
        <div class="list-card-name">${esc(list.name)}</div>
        <div class="list-card-progress-wrap">
          <div class="list-card-progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="list-card-stats">${packed} of ${total} items packed</div>
      </div>
    </div>
  </div>`;
}

async function getListCategories(listId, items) {
  // Get all categories from items + any stored in list definition
  const fromItems = [...new Set(items.map(i => i.category || 'General'))];
  const list = await Lists.get(listId);
  const fromList = list?.categoryOrder || [];
  // Merge, preserving order
  const all = [...fromList];
  fromItems.forEach(c => { if (!all.includes(c)) all.push(c); });
  if (all.length === 0) all.push('General');
  return all;
}

function packItemHTML(item) {
  return `<div class="pack-item ${item.packed ? 'packed' : ''}" id="item-${item.id}">
    <div class="pack-checkbox ${item.packed ? 'checked' : ''}"
      onclick="toggleItem('${item.id}')">
      ${item.packed ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>` : ''}
    </div>
    <span class="pack-label ${item.packed ? 'packed' : ''}"
      title="Tap to edit"
      onclick="startEditItem('${item.id}', this)">${esc(item.text)}</span>
    <button class="pack-delete" onclick="deleteItem('${item.id}')" title="Delete">✕</button>
  </div>`;
}

function startEditItem(itemId, labelEl) {
  // Don't open a second input if one is already open for this item
  if (labelEl.style.display === 'none') return;

  const input = document.createElement('input');
  input.value       = labelEl.textContent.trim();
  input.className   = 'pack-edit-input';
  input.style.cssText = `
    flex:1;font-size:15px;color:var(--text);
    background:var(--bg-subtle);border:1.5px solid var(--accent);
    border-radius:6px;padding:4px 8px;font-family:inherit;
    outline:none;min-width:0;
  `;

  // Hide label, insert input
  labelEl.style.display = 'none';
  labelEl.parentNode.insertBefore(input, labelEl.nextSibling);
  input.focus();
  input.select();

  async function save() {
    const newText = input.value.trim();
    input.remove();
    labelEl.style.display = '';
    if (!newText || newText === labelEl.textContent.trim()) return;
    // Save to DB
    const item = await Items.get(itemId);
    if (!item) return;
    item.text = newText;
    await Items.put(item);
    labelEl.textContent = newText;
    showToast('✅ Updated');
  }

  input.addEventListener('blur',    save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = labelEl.textContent.trim(); input.blur(); }
  });
}

function setFilter(f) {
  state.filter = f;
  renderList();
}

function toggleCategory(cat) {
  state.collapsed[cat] = !state.collapsed[cat];
  renderList();
}

async function toggleItem(itemId) {
  const item = await Items.get(itemId);
  if (!item) return;
  item.packed = !item.packed;
  await Items.put(item);
  // Update DOM directly for speed
  const el    = document.getElementById(`item-${itemId}`);
  const check = el?.querySelector('.pack-checkbox');
  const label = el?.querySelector('.pack-label');
  if (el) {
    el.classList.toggle('packed', item.packed);
    check?.classList.toggle('checked', item.packed);
    if (check) check.innerHTML = item.packed
      ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>`
      : '';
    label?.classList.toggle('packed', item.packed);
  }
  // Update hero stats
  refreshHeroStats();
}

async function refreshHeroStats() {
  if (!state.listId) return;
  const items  = await Items.forList(state.listId);
  const total  = items.length;
  const packed = items.filter(i => i.packed).length;
  const pct    = total ? Math.round((packed/total)*100) : 0;
  const fill   = document.querySelector('.list-hero-progress-fill');
  const stats  = document.querySelector('.list-hero-stats');
  if (fill)  fill.style.width  = pct + '%';
  if (stats) stats.textContent = `${packed} of ${total} items packed · ${pct}%${pct===100?' 🎉 All done!':''}`;
  // Update filter chips
  const chips = document.querySelectorAll('.filter-chip');
  if (chips[0]) chips[0].textContent = `All (${total})`;
  if (chips[1]) chips[1].textContent = `📦 Unpacked (${total-packed})`;
  if (chips[2]) chips[2].textContent = `✅ Packed (${packed})`;
}

async function deleteItem(itemId) {
  await Items.delete(itemId);
  const el = document.getElementById(`item-${itemId}`);
  if (el) el.remove();
  await refreshHeroStats();
  showToast('Item removed');
}

async function addItemInline(input) {
  const text = input.value.trim();
  if (!text) return;
  const cat    = input.dataset.cat || 'General';
  const listId = input.dataset.list || state.listId;

  const item = {
    id: uid(), listId, category: cat,
    text, packed: false,
    createdAt: new Date().toISOString()
  };
  await Items.put(item);
  input.value = '';

  // Insert new item before the add-item-row
  const addRow = input.closest('.add-item-row');
  const newEl  = document.createElement('div');
  newEl.innerHTML = packItemHTML(item);
  const itemEl = newEl.firstElementChild;
  addRow.parentNode.insertBefore(itemEl, addRow);

  // Re-bind toggle
  itemEl.querySelector('.pack-checkbox').addEventListener('click', () => toggleItem(item.id));
  itemEl.querySelector('.pack-delete').addEventListener('click', () => deleteItem(item.id));

  await refreshHeroStats();
  // Update category count
  const catSection = document.getElementById(`cat-${encodeURIComponent(cat)}`);
  if (catSection) {
    const items = await Items.forList(listId);
    const catItems = items.filter(i => (i.category||'General') === cat);
    const catPacked = catItems.filter(i => i.packed).length;
    const countEl = catSection.querySelector('.category-count');
    if (countEl) countEl.textContent = `${catPacked}/${catItems.length}`;
  }

  // Also update categoryOrder in list
  const list = await Lists.get(listId);
  if (list && !(list.categoryOrder||[]).includes(cat)) {
    list.categoryOrder = [...(list.categoryOrder||[]), cat];
    await Lists.put(list);
  }
}

async function packAll(listId) {
  const items = await Items.forList(listId);
  for (const item of items) {
    if (!item.packed) { item.packed = true; await Items.put(item); }
  }
  showToast('✅ All items packed!');
  renderList();
}

async function unpackAll(listId) {
  const items = await Items.forList(listId);
  for (const item of items) {
    if (item.packed) { item.packed = false; await Items.put(item); }
  }
  showToast('↩️ All items unpacked');
  renderList();
}

      style="background:${gradBg(c)}" data-color="${c}"
      onclick="document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
               this.classList.add('selected');
               document.getElementById('list-color').value='${c}'">
    </div>`
  ).join('');

  root.innerHTML = `
  <div class="form-section">
    <div class="form-group">
      <label class="form-label">List Name</label>
      <input class="form-input" id="list-name" placeholder="e.g. Bali Trip, Business Seoul"
        value="${esc(list.name)}">
    </div>
    ${isNew ? `
    <div class="form-group">
      <label class="form-label">Template</label>
      <div class="template-grid" id="template-grid">${templateCards}</div>
      <input type="hidden" id="list-template" value="${_selectedTemplate}">

      showToast('✅ List updated!');

  };
}

let _shareListId = null;

async function openShareModal(listId) {
  _shareListId = listId;
  const list  = await Lists.get(listId);
  const items = await Items.forList(listId);
  if (!list) return;

  const text = buildShareText(list, items);
  const pre  = document.getElementById('share-pre-text');
  pre.textContent = text.slice(0, 600) + (text.length > 600 ? '\n…' : '');
  window._shareText = text;

  document.getElementById('share-modal').classList.add('show');
}

function buildShareText(list, items) {
  const tpl     = TEMPLATES[list.template] || TEMPLATES.blank;
  const total   = items.length;
  const packed  = items.filter(i => i.packed).length;
  const lines   = [];

  lines.push(`🎒 PackList — ${list.name}`);
  lines.push(`${tpl.icon || '📦'} ${tpl.label || 'Custom List'}`);
  lines.push(`✅ ${packed} of ${total} items packed`);
  lines.push('');

  // Group by category
  const byCategory = {};
  items.forEach(i => {
    const c = i.category || 'General';
    if (!byCategory[c]) byCategory[c] = [];
    byCategory[c].push(i);
  });

  Object.entries(byCategory).forEach(([cat, catItems]) => {
    const catPacked = catItems.filter(i => i.packed).length;
    lines.push(`${cat} (${catPacked}/${catItems.length})`);
    catItems.sort((a,b) => Number(b.packed) - Number(a.packed)).forEach(item => {
      lines.push(`${item.packed ? '☑' : '☐'} ${item.text}`);
    });
    lines.push('');
  });

  lines.push('— Shared via PackList —');
  return lines.join('\n');
}

async function doShare() {
  const text = window._shareText || '';
  if (navigator.share) {
    try { await navigator.share({ title: 'My Packing List', text }); return; }
    catch(e) {}
  }
  await navigator.clipboard.writeText(text).catch(() => {});
  showToast('📋 Copied to clipboard');
  closeShareModal();
}

function closeShareModal() {
  document.getElementById('share-modal').classList.remove('show');
}

async function exportList(listId) {
  const list  = await Lists.get(listId);
  const items = await Items.forList(listId);
  if (!list) return;
  const payload = JSON.stringify({ version: 1, list, items }, null, 2);
  const blob    = new Blob([payload], { type: 'application/json' });
  const url     = URL.createObjectURL(blob);
  const a       = document.createElement('a');
  a.href        = url;
  a.download    = `packlist-${list.name.replace(/\s+/g,'-').toLowerCase()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('💾 List exported!');
}

async function handleImport(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const data = JSON.parse(await file.text());
    if (!data.list || !data.items) { showToast('❌ Invalid file'); return; }
    const newId = uid();
    await Lists.put({ ...data.list, id: newId,
      createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
    for (const item of data.items) {
      await Items.put({ ...item, id: uid(), listId: newId });
    }
    showToast(`✅ "${data.list.name}" imported!`);
    navigate('list', { listId: newId, filter: 'all' });
  } catch(e) {
    showToast('❌ Could not import file');
  }
  input.value = '';
}

/* ══════════════════════════════════════════════════════
   DELETE
══════════════════════════════════════════════════════ */
function confirmDelete(kind, id, name) {
  const modal = document.getElementById('delete-modal');
  document.getElementById('delete-modal-title').textContent = `Delete "${name}"?`;
  document.getElementById('delete-modal-body').textContent  =
    'This will permanently delete the list and all its items.';
  modal.classList.add('show');

  document.getElementById('delete-modal-confirm').onclick = async () => {
    modal.classList.remove('show');
    const items = await Items.forList(id);
    for (const i of items) await Items.delete(i.id);
    await Lists.delete(id);
    showToast('🗑️ List deleted');
    navigate('lists');
  };
}

function closeDeleteModal() {
  document.getElementById('delete-modal').classList.remove('show');
}

/* ══════════════════════════════════════════════════════
   SERVICE WORKER
══════════════════════════════════════════════════════ */
function registerSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('[PackList] SW registered'))
      .catch(e => console.warn('[PackList] SW error:', e));
  }
}

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
async function init() {
  await openDB();
  await loadTheme();
  registerSW();
  navigate('home', {}, false);
}

init().catch(console.error);
</script>
